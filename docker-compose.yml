services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: axiom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axiom}
      POSTGRES_DB: axiomdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axiom -d axiomdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8200:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "8000", "--detailed_debug"]
    ports:
      - "8000:8000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health/readiness')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      - redis

  auth:
    image: supabase/gotrue:v2.132.3
    # No ports needed publicly, gateway will handle it
    expose:
      - "8081"
    environment:
      GOTRUE_EXTERNAL_SAML_ENABLED: "false"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://axiom:${POSTGRES_PASSWORD:-axiom}@postgres:5432/axiomdb?sslmode=disable&search_path=auth
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_ALGORITHM: HS256
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_DB_MAX_POOL_SIZE: 20
      API_EXTERNAL_URL: http://localhost:9999
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy

  # Tiny Gateway to make GoTrue "Supabase SDK Compatible"
  gateway:
    image: nginx:alpine
    ports:
      - "9999:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth

  axiom:
    build:
      context: .
      target: runtime
    command: ["uvicorn", "axiom.api.app:app", "--host", "0.0.0.0", "--port", "8080", "--loop", "asyncio"]
    ports:
      - "8080:8080"
    volumes:
      - ./src:/app/src
      - axiom_artifacts:/tmp/axiom-artifacts
    environment:
      DATABASE_URL: postgresql://axiom:${POSTGRES_PASSWORD:-axiom}@postgres:5432/axiomdb?search_path=auth,public
      REDIS_URL: redis://redis:6379
      LITELLM_URL: http://litellm:8000
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash}
      CHROMA_URL: http://chromadb:8000
      CHROMA_TOKEN: ${CHROMA_TOKEN:-secret-chroma-token}
      NOTEBOOK_EXECUTOR_URL: http://notebook-executor:8090
      NOTEBOOK_EXECUTION_TIMEOUT: ${NOTEBOOK_EXECUTION_TIMEOUT:-60}
      ARTIFACT_ROOT: /tmp/axiom-artifacts
      SUPABASE_JWKS_URL: http://gateway/auth/v1/.well-known/jwks.json
      LAKERA_API_KEY: ${LAKERA_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TEMPORAL_URL: temporal:7233
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
      OPENSSL_armcap: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      litellm:
        condition: service_healthy
      notebook-executor:
        condition: service_started

  notebook-executor:
    build:
      context: .
      target: runtime
    command: ["uvicorn", "axiom.notebooks.executor_app:app", "--host", "0.0.0.0", "--port", "8090", "--loop", "asyncio"]
    expose:
      - "8090"
    volumes:
      - ./src:/app/src:ro
      - axiom_artifacts:/tmp/axiom-artifacts
    environment:
      PYTHONUNBUFFERED: "1"
      AXIOM_ARTIFACT_ROOT: /tmp/axiom-artifacts
    mem_limit: 1g
    cpus: 1.0

  # Temporal worker — runs the execution-phase activities (execute_sql, critic,
  # discovery, notebook, synthesize) with durable retries and execution logs.
  temporal-worker:
    build:
      context: .
      target: runtime
    command: ["python", "-m", "axiom.agent.temporal.worker"]
    volumes:
      - ./src:/app/src
      - axiom_artifacts:/tmp/axiom-artifacts
    environment:
      DATABASE_URL: postgresql://axiom:${POSTGRES_PASSWORD:-axiom}@postgres:5432/axiomdb?search_path=auth,public
      REDIS_URL: redis://redis:6379
      LITELLM_URL: http://litellm:8000
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash}
      CHROMA_URL: http://chromadb:8000
      CHROMA_TOKEN: ${CHROMA_TOKEN:-secret-chroma-token}
      ARTIFACT_ROOT: /tmp/axiom-artifacts
      TEMPORAL_URL: temporal:7233
      LAKERA_API_KEY: ${LAKERA_API_KEY:-}
      NOTEBOOK_EXECUTOR_URL: http://notebook-executor:8090
      NOTEBOOK_EXECUTION_TIMEOUT: ${NOTEBOOK_EXECUTION_TIMEOUT:-60}
      OPENSSL_armcap: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      litellm:
        condition: service_healthy
      temporal:
        condition: service_started
      notebook-executor:
        condition: service_started
    restart: on-failure

  # --- Temporal.io Infrastructure ---
  temporal:
    container_name: temporal
    image: temporalio/auto-setup:1.22.4
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=axiom
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-axiom}
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:2.21.3
    ports:
      - "8082:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  axiom_artifacts:
