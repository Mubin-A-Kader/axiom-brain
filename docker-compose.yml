services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: axiom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axiom}
      POSTGRES_DB: axiomdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axiom -d axiomdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8200:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "8000", "--detailed_debug"]
    ports:
      - "8000:8000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      - redis

  axiom:
    build:
      context: .
      target: runtime
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://axiom:${POSTGRES_PASSWORD:-axiom}@postgres:5432/axiomdb
      REDIS_URL: redis://redis:6379
      LITELLM_URL: http://litellm:8000
      CHROMA_URL: http://chromadb:8000
      LAKERA_API_KEY: ${LAKERA_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      litellm:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  chroma_data:
